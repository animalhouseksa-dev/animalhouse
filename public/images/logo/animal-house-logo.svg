<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" width="260" height="68" fill="none">
  <!-- Icon Mark: Geometric house with integrated animal silhouette -->
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9966cc"/>
      <stop offset="100%" stop-color="#7a4fb5"/>
    </linearGradient>
  </defs>
  <!-- House icon -->
  <g transform="translate(0, 6)">
    <!-- Main house body -->
    <rect x="6" y="30" width="42" height="24" rx="3" fill="url(#houseGrad)"/>
    <!-- Roof (cat-ear shape) -->
    <path d="M2 33 L27 4 L52 33" fill="url(#houseGrad)" stroke="#6a3fa5" stroke-width="1" stroke-linejoin="round"/>
    <!-- Chimney / extra ear detail -->
    <rect x="38" y="12" width="8" height="14" rx="2" fill="url(#houseGrad)"/>
    <!-- Door (warm, inviting) -->
    <rect x="21" y="38" width="12" height="16" rx="6" fill="white" opacity="0.9"/>
  </g>
  <!-- Wordmark -->
  <text x="62" y="44" font-family="'Helvetica Neue', Helvetica, 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#1a1124" letter-spacing="-0.025em">
    Animal House
  </text>
  <!-- Subtle tagline -->
  <text x="62" y="58" font-family="'Helvetica Neue', Helvetica, 'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" fill="#8b5fc7" letter-spacing="0.2em">
    NO-KILL RESCUE · RIYADH
  </text>
</svg>